# Right half is a BLE peripheral — it doesn't process keycodes,
# so WPM tracking is unavailable here (handled by the central/left).
CONFIG_ZMK_WPM=n

# nice!view is mounted portrait (tall). Tell LVGL to rotate its rendering 90°
# so LV_HOR_RES/LV_VER_RES swap to 68×160 and widgets sit upright.
# (The SSD1306 left half uses a devicetree rotation=<180> instead.)
CONFIG_LV_Z_DISPLAY_ROTATION_90=y
