# Right half is a BLE peripheral — it doesn't process keycodes,
# so WPM tracking is unavailable here (handled by the central/left).
CONFIG_ZMK_WPM=n

# Portrait rotation for the nice!view is done via lv_canvas_transform() in
# custom_status_screen.c — no Kconfig rotation needed (LV_Z_DISPLAY_ROTATION_90
# is incompatible with the monochrome LS0XX driver in Zephyr 3.5.0).
