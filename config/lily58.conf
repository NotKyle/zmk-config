CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_RAW_HID=y

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

CONFIG_ZMK_WPM=y

CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=25

# Fonts and widgets for custom status screen
CONFIG_LV_FONT_MONTSERRAT_10=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_USE_BAR=y

# Right-half rotation is set via CONFIG_LV_Z_DISPLAY_ROTATION_90 in lily58_right.conf

CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
